    <style>
        /* Estilos Generales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Organiza cabecera arriba, panel abajo */
            background-color: #f6f6f6; /* Fondo suave */
            overflow: hidden; /* Evita scroll doble en la ventana principal */
        }

        /* --- Estilos de la Cabecera (Layout Superior) --- */
        .header {
            background-color: #ffffff; /* Fondo blanco para destacar iconos */
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end; /* Alinea los iconos a la derecha */
            align-items: center;
            height: 50px; /* Altura fija de la cabecera */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* Sombra sutil */
            z-index: 10; /* Se asegura de estar sobre el panel */
        }

        .social-link {
            margin-left: 15px; /* Espacio entre iconos */
            text-decoration: none; /* Quita subrayado */
            transition: transform 0.2s; /* Animación suave al pasar el mouse */
        }

        .social-link:hover {
            transform: scale(1.1); /* Agranda un poquito al pasar el mouse */
        }

        /* Estilo para los iconos SVG (son ligeros y se ven bien en cualquier pantalla) */
        .icon {
            width: 28px; /* Tamaño del icono */
            height: 28px;
            vertical-align: middle;
        }

        /* --- Estilos del Contenedor del Panel --- */
        .main-content {
            flex: 1; /* Ocupa todo el espacio restante verticalmente */
            display: flex;
            justify-content: center; /* Centra el panel horizontalmente */
            align-items: center; /* Centra el panel verticalmente en su espacio */
            padding: 15px; /* Margen para que el panel no toque los bordes */
            box-sizing: border-box;
        }

        /* Estilos del iframe (Panel Power BI) */
        iframe {
            width: 95%; /* Un poco más angosto que la pantalla */
            height: 98%; /* Un poco más bajo para no tocar cabecera ni piso */
            border: 1px solid #ddd; /* Borde sutil */
            border-radius: 8px; /* Bordes redondeados profesionales */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Sombra para dar profundidad */
        }
    </style>
</head>
