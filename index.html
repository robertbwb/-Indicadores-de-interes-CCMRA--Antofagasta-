<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores CCMRA - Cluster Minero Antofagasta</title>
    <style>
        /* Estilos Base - Reset total para maximizar espacio */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- Layout Superior (Fondo Blanco) --- */
        .header {
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 90px; /* Altura ajustada para un banner más grande */
            border-bottom: 2px solid #f0f0f0;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            box-sizing: border-box;
            padding: 0 25px 0 0; /* Sin padding a la izquierda para que el banner pegue al borde */
        }

        /* Contenedor Izquierdo para el Banner */
        .header-left {
            display: flex;
            align-items: center;
            height: 100%; /* Ocupa todo el alto del header */
        }

        /* Ajuste del Banner: Alto total y más ancho */
        .header-banner {
            height: 100%; /* Alto total del layout */
            width: auto;  /* Mantiene la proporción original */
            max-width: 350px; /* Permite que sea más ancho que antes */
            display: block;
            object-fit: contain; /* Asegura que no se deforme */
        }

        /* Título Centralizado */
        .title-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 50%; 
            text-align: center;
            pointer-events: none; /* Permite que no interfiera con clics */
        }

        .title {
            color: #000000;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        /* Contenedor Derecho: Redes Sociales */
.header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .social-link {
            margin-left: 20px;
            transition: transform 0.2s;
        }

        .social-link:hover {
            transform: scale(1.15);
        }

        .icon {
            width: 28px;
            height: 28px;
            display: block;
        }

        /* --- Contenedor del Panel Power BI (Ajuste Máximo) --- */
        .main-content {
            flex: 1;
            width: 100%;
            display: flex;
            background-color: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Responsive para pantallas medianas/pequeñas */
        @media (max-width: 1100px) {
            .title { font-size: 1rem; }
            .header-banner { max-width: 250px; }
        }

        @media (max-width: 768px) {
            .header-right { display: none; } /* Ocultar redes en móvil */
            .header { height: 70px; }
            .title { font-size: 0.8rem; }
            .title-container { width: 60%; left: 55%; }
        }
    </style>
</head>
<body>
