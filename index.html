<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma CCMRA - Cluster Minero Antofagasta</title>
    <style>
        /* Estilos Base */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- Layout Superior --- */
        .header {
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 90px;
            border-bottom: 2px solid #f0f0f0;
            position: relative;
            z-index: 100;
            flex-shrink: 0;
            box-sizing: border-box;
            padding: 0 25px 0 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* Botón de Menú (Hamburguesa) */
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 25px;
            z-index: 101;
        }

        .menu-btn span {
            width: 30px;
            height: 3px;
            background-color: #333;
            border-radius: 10px;
            transition: 0.3s;
        }

        .header-banner {
            height: 100%;
            width: auto;
            max-width: 300px;
            display: block;
            object-fit: contain;
        }

        .title-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 45%; 
            text-align: center;
            pointer-events: none;
        }

        .title {
            color: #000000;
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        /* --- Menú Lateral (Sidebar) --- */
        .sidebar {
            position: fixed;
            left: -280px; /* Escondido por defecto */
            top: 0;
            height: 100%;
            width: 280px;
            background-color: #ffffff;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            transition: 0.4s ease;
            z-index: 90;
            padding-top: 110px; /* Espacio para no chocar con el header */
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-item {
            padding: 15px 25px;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            border-left: 5px solid transparent;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: #f9f9f9;
            color: #4AB37F;
            border-left: 5px solid #4AB37F;
        }

        .sidebar-item.active {
            background-color: #f0fdf4;
            color: #4AB37F;
            border-left: 5px solid #4AB37F;
        }

        /* Overlay para cerrar el menú al hacer clic fuera */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 80;
        }

        .overlay.active {
            display: block;
        }

        /* --- Contenedor Derecho: Redes --- */
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .social-link {
            margin-left: 20px;
            transition: transform 0.2s;
        }

        .social-link:hover { transform: scale(1.15); }
        .icon { width: 30px; height: 30px; display: block; }

        /* --- Contenedor Principal BI --- */
        .main-content {
            flex: 1;
            width: 100%;
            display: flex;
            background-color: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Escondidos por defecto */
        }

        iframe.active {
            display: block; /* Solo el activo se muestra */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title { font-size: 0.9rem; }
            .header-right { display: none; }
            .header { height: 75px; }
            .header-banner { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <img src="banner_ccmra.png" alt="Banner CCMRA" class="header-banner">
        </div>

        <div class="title-container">
            <h1 class="title" id="main-title">Indicadores de Interés</h1>
        </div>

        <div class="header-right">
            <a href="https://cl.linkedin.com/company/corporacion-cluster-minero-region-de-antofagasta" target="_blank" class="social-link">
                <svg class="icon" viewBox="0 0 24 24" fill="#0A66C2"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
            <a href="https://www.instagram.com/clustermineroregionantofagasta/" target="_blank" class="social-link">
                <svg class="icon" viewBox="0 0 24 24" fill="#E4405F"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.919-.058-1.265-.069-1.646-.069-4.849 0-3.204.013-3.583.069-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-item active" onclick="switchPanel('indicadores', 'Indicadores de Interés', this)">
            Indicadores de Interés
        </div>
        <div class="sidebar-item" onclick="switchPanel('mapa', 'Mapa Minero de Antofagasta', this)">
            Mapa Minero
        </div>
    </nav>

    <main class="main-content">
        <iframe 
            id="indicadores"
            class="active"
            src="https://app.powerbi.com/view?r=eyJrIjoiODA4ZWI0NWEtYzQxYi00YjdhLWI1MDgtZTUzODliY2NiZjk3IiwidCI6IjlkMzA3YWIyLWUzMzItNDNjMy05M2FhLTNlNzI0OGZmZTc3ZCIsImMiOjR9" 
            allowFullScreen="true">
        </iframe>

        <iframe 
            id="mapa"
            src="https://app.powerbi.com/view?r=eyJrIjoiYWJhOGVjNjUtMWVkNy00Nzc2LWI0NzYtYzAyMWE2ZjNmYTJlIiwidCI6IjlkMzA3YWIyLWUzMzItNDNjMy05M2FhLTNlNzI0OGZmZTc3ZCIsImMiOjR9" 
            allowFullScreen="true">
        </iframe>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchPanel(id, title, element) {
            // 1. Cambiar visibilidad de los Iframes
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');

            // 2. Cambiar título central
            document.getElementById('main-title').innerText = title;

            // 3. Cambiar estado activo en el menú
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            // 4. Cerrar el menú
            toggleMenu();
        }
    </script>
</body>
</html>
