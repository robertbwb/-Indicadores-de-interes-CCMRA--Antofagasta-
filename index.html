<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores CCMRA - Cluster Minero Antofagasta</title>
    <style>
        /* Estilos Base */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- Franja Superior Blanca para el Logo --- */
        .logo-bar {
            background-color: #ffffff;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid #eeeeee;
        }

        .logo {
            height: 60px; /* Tamaño optimizado para claridad */
            width: auto;
        }

        /* --- Franja de Color para Título y Redes (#4AB37F) --- */
        .header {
            background-color: #4AB37F; 
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative; /* Necesario para centrar el título con exactitud */
        }

        /* Título Centralizado */
        .title-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 80%; /* Evita que choque con los iconos en pantallas chicas */
            text-align: center;
        }

        .title {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Contenedor Derecho: Redes Sociales */
        .header-right {
            margin-left: auto; /* Empuja las redes a la derecha */
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .social-link {
            margin-left: 15px;
            transition: transform 0.2s;
        }

        .social-link:hover {
            transform: scale(1.1);
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* --- Contenedor del Panel Power BI --- */
        .main-content {
            flex: 1;
            display: flex;
            background-color: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .logo-bar { height: 60px; justify-content: center; padding: 0; }
            .logo { height: 45px; }
            .title { font-size: 0.85rem; }
            .header-right { display: none; } /* Oculta redes en móvil para priorizar título */
        }
    </style>
</head>
<body>
